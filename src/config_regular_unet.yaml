version: 2
project_name: deadtrees_segmentation
resume: False
fast_dev_run: False
overfit_batches: 1

data:
  train_image_glob: "../DeadTrees/train/images/*.tif"
  train_mask_glob: "../DeadTrees/train/masks/*.tif"
  val_image_glob: "../DeadTrees/val/images/*.tif"
  val_mask_glob: "../DeadTrees/val/masks/*.tif"
  dataset_cls: DeadTrees
  white_threshold: 0.1

model:
  encoder_name: resnet34
  encoder_weights: imagenet
  in_channels: 3
  classes: 2

augmentation:
  apply: False
  horizontal_flip: 0.5
  vertical_flip: 0.5
  color_jitter_brightness: 0.2
  color_jitter_contrast: 0.2
  color_jitter_saturation: 0.2
  color_jitter_hue: 0.1
  collor_jitter_prob: 0.5
  gaussian_noise_prob: 0.5
  gaussian_noise_mean: 0.0
  gaussian_noise_std: 0.05

architecture:
  criterion: DiceLoss
  criterion_kwargs:
    - mode: binary
  optimizer: AdamW
  optimizer_kwargs:
    - learning_rate: 1e-3
    - weight_decay: 1e-5
  metrics: Dice
  metrics_kwargs:
    - num_classes: 2
    - include_background: False
  add_channel_dim: True ## Necessary when using Dice Loss

trainer:
  accelerator: gpu
  devices: 1
  batch_size: 16
  num_workers: 10
  num_epochs: 50
  accumulate_grad_batches: 4
  precision: 16-mixed
